version = 0.1

[default.build.parameters]
cached = true

# sam deploy
[default.deploy.parameters]
capabilities = "CAPABILITY_IAM CAPABILITY_AUTO_EXPAND"
stack_name = "WebAliveMonitoring-Dev"
region = "ap-northeast-1"
s3_bucket = "osasi-sam-ap-northeast-1"
s3_prefix = "WebAliveMonitoring-Dev"
confirm_changeset = false
disable_rollback = false
parameter_overrides = [
    "StackName=WebAliveMonitoring-Dev",
    "ProjectName=web-alive-monitoring",
    "LogLevel=DEBUG",
    "SubDomain=web-alive-dev",
    "AllowedIpAddresses=210.225.75.184",
    "HostedZoneId=Z2TVUBVNI4RE7N",
    "AcmCertificateArn=arn:aws:acm:us-east-1:989982802989:certificate/a6adb70c-a211-42cf-b43f-e290affd19f1",
    "OsasiPowertoolsPython=arn:aws:lambda:ap-northeast-1:989982802989:layer:OsasiPowertoolsPython:79",
]

# sam deploy --config-env production
[production.deploy.parameters]
capabilities = "CAPABILITY_IAM CAPABILITY_AUTO_EXPAND"
stack_name = "WebAliveMonitoring"
region = "ap-northeast-1"
s3_bucket = "osasi-sam-ap-northeast-1"
s3_prefix = "WebAliveMonitoring"
confirm_changeset = true
disable_rollback = false
parameter_overrides = [
    "StackName=WebAliveMonitoring",
    "ProjectName=web-alive-monitoring",
    "LogLevel=INFO",
    "SubDomain=web-alive",
    "AllowedIpAddresses=210.225.75.184",
    "HostedZoneId=Z2TVUBVNI4RE7N",
    "AcmCertificateArn=arn:aws:acm:us-east-1:989982802989:certificate/a6adb70c-a211-42cf-b43f-e290affd19f1",
    "OsasiPowertoolsPython=arn:aws:lambda:ap-northeast-1:989982802989:layer:OsasiPowertoolsPython:79",
]
