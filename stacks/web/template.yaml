AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Site Monitor - S3 + CloudFront + Route 53

Parameters:
  StackName:
    Type: String
  ProjectName:
    Type: String
  BaseDomainName:
    Type: String
    Default: example-cloud.com
  SubDomain:
    Type: String
  HostedZoneId:
    Type: String
  AcmCertificateArn:
    Type: String
  AllowedIpAddresses:
    Type: CommaDelimitedList

Resources:
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${SubDomain}-website-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Name
          Value: Bucket

  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${WebsiteBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${StackName}-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_200
        Comment: !Sub '${StackName} - Site Monitor'
        Aliases:
          - !Sub '${SubDomain}.${BaseDomainName}'
        ViewerCertificate:
          AcmCertificateArn: !Ref AcmCertificateArn
          SslSupportMethod: sni-only
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt WebsiteBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          Compress: true
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt IpRestrictFunction.FunctionARN
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Name
          Value: Distribution

  IpRestrictFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub '${StackName}-ip-restrict'
      AutoPublish: true
      FunctionConfig:
        Comment: IP restriction for Site Monitor
        Runtime: cloudfront-js-2.0
      FunctionCode: !Sub
        - |
          function handler(event) {
            var request = event.request;
            var clientIp = event.viewer.ip;
            var allowedIps = '${AllowedIps}'.split(',').map(function(ip) { return ip.trim(); });

            if (allowedIps.indexOf(clientIp) === -1) {
              return {
                statusCode: 403,
                statusDescription: 'Forbidden',
                body: { encoding: 'text', data: 'Access denied' }
              };
            }

            return request;
          }
        - AllowedIps: !Join [',', !Ref AllowedIpAddresses]

  RecordSetGroup:
    Type: AWS::Route53::RecordSetGroup
    Properties:
      HostedZoneId: !Ref HostedZoneId
      RecordSets:
        - Name: !Sub '${SubDomain}.${BaseDomainName}'
          Type: A
          AliasTarget:
            HostedZoneId: Z2FDTNDATAQYW2
            DNSName: !GetAtt CloudFrontDistribution.DomainName

Outputs:
  CustomDomainUrl:
    Value: !Sub 'https://${SubDomain}.${BaseDomainName}'
  CloudFrontDistributionId:
    Value: !Ref CloudFrontDistribution
  WebsiteBucketName:
    Value: !Ref WebsiteBucket
